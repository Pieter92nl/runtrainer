<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="HM Trainer">
<meta name="theme-color" content="#08080A">
<title>HM Trainer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
--bg:#08080A;--s1:#111114;--s2:#1B1B20;--s3:#26262D;
--text:#EEEEF0;--t2:#A0A0AC;--t3:#66666F;
--orange:#FF6B35;--orangeDim:rgba(255,107,53,.10);
--teal:#2DD4BF;--tealDim:rgba(45,212,191,.10);
--blue:#6C9EFF;--blueDim:rgba(108,158,255,.10);
--yellow:#FACC15;--yellowDim:rgba(250,204,21,.10);
--red:#FF5C5C;--redDim:rgba(255,92,92,.10);
--green:#34D399;--greenDim:rgba(52,211,153,.10);
--grey:#8B8B96;--greyDim:rgba(139,139,150,.10);
--font:'DM Sans',system-ui,-apple-system,sans-serif;
--mono:'JetBrains Mono','SF Mono',monospace;
--safe-b:env(safe-area-inset-bottom,0px)}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:var(--font);-webkit-font-smoothing:antialiased;-webkit-tap-highlight-color:transparent}
body{display:flex;flex-direction:column}
#app{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:calc(76px + var(--safe-b))}
input,textarea,button{font-family:var(--font);-webkit-appearance:none}

/* Sync dot */
.sync-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-left:6px;vertical-align:middle}
.sync-dot.ok{background:var(--green)}.sync-dot.saving{background:var(--yellow);animation:pulse 1s infinite}.sync-dot.err{background:var(--red)}.sync-dot.off{background:var(--t3)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* Login */
.login-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:40px 24px;text-align:center}
.login-screen h1{font-size:32px;font-weight:700;margin-bottom:8px;letter-spacing:-.03em}
.login-screen h1 span{color:var(--orange)}
.login-screen p{color:var(--t2);font-size:15px;margin-bottom:32px;line-height:1.6;max-width:300px}
.login-btn{padding:16px 32px;border:none;border-radius:14px;background:var(--orange);color:#000;font-size:16px;font-weight:700;cursor:pointer;font-family:var(--font);display:flex;align-items:center;gap:10px}
.login-sub{margin-top:16px;font-size:12px;color:var(--t3);max-width:260px;line-height:1.5}

/* Nav */
.nav{position:fixed;bottom:0;left:0;right:0;z-index:200;background:rgba(8,8,10,.94);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-top:1px solid var(--s3);display:flex;padding-bottom:var(--safe-b)}
.nav button{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:11px 0 9px;background:none;border:none;color:var(--t3);font-size:10px;font-weight:600;cursor:pointer}
.nav button.on{color:var(--orange)}
.nav button svg{width:22px;height:22px}

/* Header */
.hdr{position:sticky;top:0;z-index:100;background:var(--bg);padding:14px 20px 0;border-bottom:1px solid var(--s2)}
.hdr-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.hdr h1{font-size:22px;font-weight:700;letter-spacing:-.03em}
.hdr h1 span{color:var(--orange)}
.badge{font-size:11px;font-weight:600;color:var(--orange);background:var(--orangeDim);padding:5px 12px;border-radius:20px;display:flex;align-items:center;gap:4px;max-width:200px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.pills{display:flex;gap:7px;overflow-x:auto;padding-bottom:14px;scrollbar-width:none}
.pills::-webkit-scrollbar{display:none}
.pill{flex-shrink:0;padding:7px 16px;border-radius:20px;font-size:13px;font-weight:600;background:var(--s2);color:var(--t3);border:none;cursor:pointer}
.pill.on{background:var(--orange);color:#000}.pill.done{background:var(--s3);color:var(--text)}

/* Phase + volume */
.phase{padding:16px 20px 6px;display:flex;align-items:center;gap:9px}
.phase .dot{width:9px;height:9px;border-radius:50%}
.phase .lbl{font-size:14px;font-weight:700}
.phase .dt{margin-left:auto;font-size:13px;color:var(--t3)}
.vol{padding:2px 20px 18px;display:flex;align-items:center;gap:16px}
.vol .num{font-size:30px;font-weight:700;letter-spacing:-.04em;line-height:1}
.vol .num span{font-size:15px;font-weight:500;color:var(--t2);margin-left:3px}
.vol .bar-w{flex:1;display:flex;align-items:center;gap:10px}
.vol .bar{flex:1;height:6px;background:var(--s3);border-radius:4px;overflow:hidden}
.vol .bar div{height:100%;border-radius:4px;transition:width .4s}
.vol .pct{font-size:13px;font-weight:700;min-width:38px;text-align:right}

/* Cards */
.cards{padding:0 16px;display:flex;flex-direction:column;gap:10px}
.card{background:var(--s1);border-radius:16px;padding:18px;border:1px solid rgba(255,255,255,.03);cursor:pointer}
.card.logged{border-color:rgba(255,255,255,.07)}
.card-top{display:flex;align-items:center;gap:12px;margin-bottom:10px}
.card-ico{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.card-title{font-size:16px;font-weight:700;line-height:1.2;margin-bottom:2px}
.card-desc{font-size:14px;color:var(--t2);line-height:1.4}
.card-check{width:26px;height:26px;border-radius:50%;border:2px solid var(--s3);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0;color:transparent}
.card-check.done{border-color:var(--green);background:var(--green);color:#000}
.card-metrics{display:flex;gap:14px;font-size:14px;font-weight:600}
.card-tip{font-size:13px;color:var(--orange);background:var(--orangeDim);padding:8px 12px;border-radius:10px;line-height:1.5;margin-top:6px}
.card-log{display:flex;gap:10px;margin-top:12px;padding-top:12px;border-top:1px solid var(--s2);font-size:13px;color:var(--t2);align-items:center;flex-wrap:wrap}
.tag{background:var(--s2);padding:3px 10px;border-radius:7px;font-weight:600}
.stars{color:var(--yellow);letter-spacing:1px}

/* Sheet */
.overlay{position:fixed;inset:0;z-index:300;background:rgba(0,0,0,.55);backdrop-filter:blur(4px);display:none}
.overlay.open{display:block}
.sheet{position:fixed;bottom:0;left:0;right:0;z-index:301;background:var(--s1);border-radius:22px 22px 0 0;padding:20px 22px calc(24px + var(--safe-b));max-height:88vh;overflow-y:auto;transform:translateY(100%);transition:transform .3s cubic-bezier(.32,.72,0,1)}
.sheet.open{transform:translateY(0)}
.sheet-bar{width:40px;height:5px;border-radius:3px;background:var(--s3);margin:0 auto 18px}
.sheet h2{font-size:20px;font-weight:700;margin-bottom:4px}
.sheet .sub{font-size:14px;color:var(--t2);margin-bottom:20px}
.hint{font-size:13px;padding:8px 12px;border-radius:10px;margin-bottom:18px;line-height:1.5}
.hint.lt2{color:var(--orange);background:var(--orangeDim)}
.hint.other{color:var(--teal);background:var(--tealDim)}

/* Form */
.field{margin-bottom:20px}
.field label{display:block;font-size:12px;font-weight:700;color:var(--t2);margin-bottom:8px;text-transform:uppercase;letter-spacing:.06em}
.field input,.field textarea{width:100%;background:var(--s2);border:1px solid var(--s3);border-radius:12px;padding:14px 16px;font-size:16px;color:var(--text);outline:none}
.field input:focus,.field textarea:focus{border-color:var(--orange)}
.field textarea{resize:none;min-height:80px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.feels{display:flex;gap:8px}
.feel{width:52px;height:52px;border-radius:14px;font-size:22px;cursor:pointer;border:2px solid var(--s3);background:var(--s2);display:flex;align-items:center;justify-content:center}
.feel.sel{border-color:var(--yellow);background:var(--yellowDim)}
.btn-save{width:100%;padding:16px;border:none;border-radius:14px;background:var(--orange);color:#000;font-size:16px;font-weight:700;cursor:pointer}
.btn-del{width:100%;padding:12px;border:none;background:none;color:var(--red);font-size:14px;font-weight:600;cursor:pointer;margin-top:4px}

/* Terrain toggle */
.terrain-toggle{display:flex;gap:8px}
.terrain-btn{padding:10px 18px;border-radius:12px;font-size:14px;font-weight:600;cursor:pointer;border:2px solid var(--s3);background:var(--s2);color:var(--t2)}
.terrain-btn.sel{border-color:var(--green);background:var(--greenDim);color:var(--green)}

/* Page header */
.page-hdr{position:sticky;top:0;z-index:100;background:var(--bg);padding:14px 20px 16px;border-bottom:1px solid var(--s2)}
.page-hdr h1{font-size:22px;font-weight:700}
.section{padding:16px}

/* Insight cards */
.icard{background:var(--s1);border-radius:16px;padding:20px;margin-bottom:12px;border:1px solid rgba(255,255,255,.04)}
.icard h3{font-size:12px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:14px}
.big{font-size:36px;font-weight:700;letter-spacing:-.04em}.big span{font-size:16px;color:var(--t2);font-weight:500}
.legend{display:flex;gap:16px;font-size:11px;color:var(--t3);margin-top:14px}
.legend i{display:inline-block;width:10px;height:10px;border-radius:2px;margin-right:5px;vertical-align:middle}
.info-val{font-size:24px;font-weight:700;color:var(--orange);margin-bottom:4px}
.info-p{font-size:14px;color:var(--t2);line-height:1.7}

/* Table */
table{width:100%;border-collapse:collapse;font-size:13px}
th{font-size:11px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.04em;text-align:left;padding:8px 6px;border-bottom:1px solid var(--s3)}
th:nth-child(n+2){text-align:right}td{padding:10px 6px;border-bottom:1px solid var(--s2)}td:nth-child(n+2){text-align:right}

/* Timeline */
.tl-section{display:flex;flex-direction:column;gap:6px}
.tl-week{display:flex;gap:14px;padding:12px 14px;border-radius:12px;background:var(--s1);border:1px solid rgba(255,255,255,.03)}
.tl-week.current{border-color:var(--orange);background:rgba(255,107,53,.04)}
.tl-week.empty{opacity:.5}
.tl-cw{display:flex;flex-direction:column;align-items:center;justify-content:center;min-width:36px}
.tl-content{flex:1}

/* More menu */
.more-menu-btn{display:flex;align-items:center;gap:14px;padding:16px;background:var(--s1);border:1px solid rgba(255,255,255,.04);border-radius:14px;cursor:pointer;width:100%;text-align:left}
.more-ico{font-size:22px;width:44px;height:44px;border-radius:12px;background:var(--s2);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.more-txt{flex:1}
.more-title{font-size:15px;font-weight:700;color:var(--text);margin-bottom:2px}
.more-sub{font-size:12px;color:var(--t3)}
.more-arrow{font-size:16px;color:var(--t3)}
</style>
</head>
<body>
<div id="app"></div>
<nav class="nav" id="nav" style="display:none"></nav>
<div class="overlay" id="ov"></div>
<div class="sheet" id="sh"></div>

<script src="https://accounts.google.com/gsi/client" async defer></script>
<script src="data.js"></script>
<script src="app.js"></script>
<script src="plan.js"></script>
<script src="timeline.js"></script>
<script src="insights.js"></script>
<script src="library.js"></script>
<script src="builder.js"></script>
<script src="more.js"></script>
</body>
</html>
